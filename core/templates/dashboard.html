<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friendly DNS Reporter - Forensic Console</title>
    <style>
        :root {
            --bg: #090b10;
            --card-bg: #11141a;
            --header-bg: #181b1f;
            --border: #222529;
            --text-primary: #d8d9da;
            --text-secondary: #949a9e;
            --accent: #3274d9;
            --success: #56a64b;
            --warning: #f2cc0c;
            --danger: #e02f44;
            --info: #3274d9;
            --highlight-bg: rgba(224, 47, 68, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.5; padding: 20px; font-weight: 400; }
        .container { max-width: 1600px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; gap: 20px; border-bottom: 1px solid var(--border); padding-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .brand h1 { font-size: 24px; color: #fff; font-weight: 800; letter-spacing: -0.5px; }
        .brand p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        
        .search-container { position: relative; flex-grow: 1; max-width: 600px; }
        .global-search { width: 100%; background: var(--card-bg); border: 1px solid var(--border); color: #fff; padding: 12px 20px 12px 45px; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        .global-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(50, 116, 217, 0.2); }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; }

        .analytics-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .metric-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; border-bottom: 3px solid transparent; }
        .metric-card.alert { border-bottom-color: var(--danger); }
        .metric-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; margin-bottom: 8px; }
        .metric-value { font-size: 22px; font-weight: 800; color: #fff; display: flex; align-items: baseline; gap: 5px; }
        .metric-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .radar-strip { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .radar-item { display: flex; align-items: center; gap: 10px; background: rgba(50, 116, 217, 0.05); border: 1px solid var(--border); padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .radar-item.danger { color: var(--danger); border-color: rgba(224, 47, 68, 0.3); background: rgba(224, 47, 68, 0.05); }
        .radar-item.safe { color: var(--success); border-color: rgba(86, 166, 75, 0.3); background: rgba(86, 166, 75, 0.05); }

        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
        .chart-svg { width: 100%; height: 120px; overflow: visible; }
        .line-path { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .data-point { fill: #fff; stroke: var(--accent); stroke-width: 2; r: 3.5; cursor: pointer; }
        .data-point:hover { r: 5; }

        .forensic-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 30px; overflow: hidden; }
        .panel-header { background: #1a1e23; padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .panel-title { font-size: 14px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .panel-analytics { display: flex; gap: 20px; }
        
        .table-area { overflow-x: auto; max-height: 600px; overflow-y: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 10; background: #1a1e23; }
        th { padding: 12px 15px; text-transform: uppercase; font-size: 11px; color: var(--text-secondary); font-weight: 700; border-bottom: 1px solid var(--border); cursor: pointer; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); color: #cdd1d4; }
        tr.anomaly-row td { background: var(--highlight-bg); }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-danger { background: rgba(224, 47, 68, 0.15); color: #ff5f6d; }
        .badge-success { background: rgba(86, 166, 75, 0.15); color: #73f273; }
        .badge-warning { background: rgba(242, 204, 12, 0.15); color: #ffdb33; }
        .badge-info { background: rgba(50, 116, 217, 0.15); color: #7fbcf5; }

        .text-match { background: rgba(242, 204, 12, 0.3); color: #fff; padding: 0 2px; border-radius: 2px; }
        .source-box { border: 2px dashed var(--border); padding: 50px; text-align: center; border-radius: 12px; margin-bottom: 25px; }
        .source-box.active { border-color: var(--accent); background: rgba(50, 116, 217, 0.05); }
        .collapsed { display: none; }
        .btn { background: var(--header-bg); color: #fff; border: 1px solid var(--border); padding: 8px 15px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        select { background: #000; color: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 6px; outline: none; }
    </style>
</head>
<body>

<div class="container" id="app">
    <header>
        <div class="brand">
            <h1>Forensic Analysis Console</h1>
            <p id="sub-header">Scanning infrastructure...</p>
        </div>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="global-search" id="global-search" placeholder="Search tables (domain, IP, status...)" onkeyup="uiRenderer.applyFilter(this.value)">
        </div>
        <div class="controls" style="display:flex; gap:10px">
            <select id="report-selector" onchange="dataManager.switchTo(this.value)">
                <option value="">Awaiting Index...</option>
            </select>
            <button class="btn" onclick="document.getElementById('file-input').click()">Import JSONs</button>
            <input type="file" id="file-input" multiple accept=".json" style="display:none" onchange="dataManager.handleFiles(event)">
        </div>
    </header>

    <div id="source-drop" class="source-box" ondragover="this.classList.add('active'); event.preventDefault()" ondragleave="this.classList.remove('active')" ondrop="dataManager.handleDrop(event)">
        <div style="font-size:18px; font-weight:800; color:#fff">Forensic Payload Missing</div>
        <p style="font-size:13px; color:var(--text-secondary); margin-top:8px">Drop <code>report_*.json</code> files here to begin analysis.</p>
    </div>

    <div class="radar-strip" id="incident-radar"></div>
    <div class="analytics-strip" id="global-analytics"></div>

    <div class="charts-container" id="charts-panel" style="display:none">
        <div class="chart-box"><div class="metric-label">Security & Privacy Trends</div><div id="sec-priv-chart"></div></div>
        <div class="chart-box"><div class="metric-label">Success Rate (%)</div><div id="success-chart"></div></div>
        <div class="chart-box"><div class="metric-label">Divergence Load</div><div id="div-chart"></div></div>
    </div>

    <div id="details-view" style="display:none">
        <div class="forensic-panel">
            <div class="panel-header" onclick="dataManager.toggleSection('p1')">
                <div class="panel-title">01 INFRASTRUCTURE VULNERABILITIES</div>
                <div class="panel-analytics" id="p1-analytics"></div>
            </div>
            <div class="table-area" id="p1-content"></div>
        </div>
        <div class="forensic-panel">
            <div class="panel-header" onclick="dataManager.toggleSection('p2')">
                <div class="panel-title">02 ZONE INTEGRITY & COMPLIANCE</div>
                <div class="panel-analytics" id="p2-analytics"></div>
            </div>
            <div class="table-area collapsed" id="p2-content"></div>
        </div>
        <div class="forensic-panel">
            <div class="panel-header" onclick="dataManager.toggleSection('p3')">
                <div class="panel-title">03 SEMANTIC RECORD CONSISTENCY</div>
                <div class="panel-analytics" id="p3-analytics"></div>
            </div>
            <div class="table-area collapsed" id="p3-content"></div>
        </div>
    </div>
</div>

<script>
    const dataManager = {
        reports: [],
        current: null,
        index: [],
        sortKey: '',
        sortDesc: false,

        async init() {
            try {
                const r = await fetch('reports_index.json');
                if (r.ok) {
                    const d = await r.json();
                    this.index = d.reports || [];
                    this.updateSelector();
                    if (this.index.length > 0) this.loadReport(this.index[0]);
                }
            } catch(e) {}
        },

        updateSelector() {
            const s = document.getElementById('report-selector');
            s.innerHTML = this.index.map(f => `<option value="${f}">${f}</option>`).join('');
        },

        async loadReport(file) {
            try {
                const r = await fetch(file);
                const d = await r.json();
                this.addReport(d, file);
            } catch(e) {}
        },

        addReport(data, file) {
            if (!this.reports.find(r => r._file === file)) {
                data._file = file;
                this.reports.push(data);
                this.reports.sort((a,b) => b.summary.timestamp.localeCompare(a.summary.timestamp));
                if (!this.index.includes(file)) {
                    this.index.push(file);
                    this.updateSelector();
                }
            }
            this.switchTo(file);
        },

        switchTo(file) {
            const r = this.reports.find(r => r._file === file);
            if (!r) return;
            this.current = r;
            document.getElementById('report-selector').value = file;
            uiRenderer.renderAll();
            trendAnalyzer.render();
            document.getElementById('source-drop').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            document.getElementById('charts-panel').style.display = 'grid';
        },

        handleFiles(e) {
            Array.from(e.target.files).forEach(f => {
                const reader = new FileReader();
                reader.onload = (ev) => this.addReport(JSON.parse(ev.target.result), f.name);
                reader.readAsText(f);
            });
        },

        handleDrop(e) {
            e.preventDefault();
            this.handleFiles({ target: { files: e.dataTransfer.files } });
        },

        toggleSection(id) {
            document.getElementById(id + '-content').classList.toggle('collapsed');
        },

        setSort(key) {
            if (this.sortKey === key) this.sortDesc = !this.sortDesc;
            else { this.sortKey = key; this.sortDesc = false; }
            uiRenderer.renderDetails();
        }
    };

    const uiRenderer = {
        filter: '',

        renderAll() {
            this.renderGlobal();
            this.renderRadar();
            this.renderDetails();
        },

        renderGlobal() {
            const s = dataManager.current.summary;
            const meta = dataManager.current.metadata;
            document.getElementById('sub-header').innerText = `Analysis: ${meta.arguments.domains} @ ${new Date(s.timestamp).toLocaleString()}`;
            
            const metrics = [
                { l: 'Security Score', v: s.security_score + '%', c: this.getClr(s.security_score) },
                { l: 'Privacy Score', v: s.privacy_score + '%', c: this.getClr(s.privacy_score) },
                { l: 'Health Grade', v: s.global_grade, c: s.global_grade.includes('A') ? 'var(--success)' : 'var(--danger)' },
                { l: 'Queries OK', v: ((s.success_queries / s.total_queries)*100).toFixed(1) + '%', sub: `${s.success_queries}/${s.total_queries}` },
                { l: 'Divergences', v: s.divergences, c: s.divergences > 0 ? 'var(--danger)' : 'var(--success)' },
                { l: 'Duration', v: s.execution_time_s + 's' }
            ];

            document.getElementById('global-analytics').innerHTML = metrics.map(m => `
                <div class="metric-card">
                    <div class="metric-label">${m.l}</div>
                    <div class="metric-value" style="color:${m.c || '#fff'}">${m.v}</div>
                    <div class="metric-sub">${m.sub || ''}</div>
                </div>`).join('');
        },

        renderRadar() {
            const det = dataManager.current.detailed_results;
            const infra = Object.values(det.infrastructure);
            
            const counts = {
                'Open Resolver': infra.filter(i => i.open_resolver === 'OPEN').length,
                'Lame Delegation': det.zones.filter(z => !z.aa && z.status === 'NOERROR').length,
                'Divergence': det.records.filter(r => r.internally_consistent === 'DIV!').length,
                'Low TTL': det.records.filter(r => r.findings && r.findings.some(f => f.includes('TTL'))).length,
                'Desync': det.zones.filter(z => !z.zone_is_synced).length
            };

            document.getElementById('incident-radar').innerHTML = Object.entries(counts).map(([l, v]) => `
                <div class="radar-item ${v > 0 ? 'danger' : 'safe'}">
                    <span class="badge ${v > 0 ? 'badge-danger' : 'badge-success'}">${v}</span> ${l}
                </div>`).join('');
        },

        applyFilter(v) { this.filter = v.toLowerCase(); this.renderDetails(); },
        getClr(s) { return s >= 90 ? 'var(--success)' : (s >= 70 ? 'var(--warning)' : 'var(--danger)'); },
        highlight(t) { return this.filter ? String(t).replace(new RegExp(`(${this.filter})`, 'gi'), '<span class="text-match">$1</span>') : t; },

        renderDetails() {
            this.renderP1();
            this.renderP2();
            this.renderP3();
        },

        renderP1() {
            const data = Object.entries(dataManager.current.detailed_results.infrastructure).map(([ip, d]) => ({ ip, ...d }));
            const filtered = data.filter(d => JSON.stringify(d).toLowerCase().includes(this.filter));
            
            const insights = dataManager.current.analytics.phase1_infrastructure || {};
            document.getElementById('p1-analytics').innerHTML = Object.entries(insights).map(([k,v]) => `<div style="font-size:10px">${k}: <b>${v}</b></div>`).join('');

            let html = `<table><thead><tr><th>Group</th><th>IP Address</th><th>Ping</th><th>U53</th><th>T53</th><th>DoT</th><th>DoH</th><th>Score</th><th>OpenRes</th></tr></thead><tbody>`;
            filtered.forEach(d => {
                html += `<tr class="${d.open_resolver==='OPEN'?'anomaly-row':''}">
                    <td>${this.highlight(d.groups)}</td>
                    <td>${this.highlight(d.ip)}</td>
                    <td>${d.latency.toFixed(0)}ms</td>
                    <td><span class="badge ${d.port53u_serv==='OK'?'badge-success':'badge-danger'}">${d.port53u_serv}</span></td>
                    <td><span class="badge ${d.port53t_serv==='OK'?'badge-success':'badge-danger'}">${d.port53t_serv}</span></td>
                    <td>${d.dot}</td><td>${d.doh}</td>
                    <td style="color:${this.getClr(d.infrastructure_score)}">${d.infrastructure_score}</td>
                    <td><span class="badge ${d.open_resolver==='SAFE'?'badge-success':'badge-danger'}">${d.open_resolver}</span></td>
                </tr>`;
            });
            document.getElementById('p1-content').innerHTML = html + '</tbody></table>';
        },

        renderP2() {
            const data = dataManager.current.detailed_results.zones;
            const filtered = data.filter(d => JSON.stringify(d).toLowerCase().includes(this.filter));
            
            const insights = dataManager.current.analytics.phase2_zones || {};
            document.getElementById('p2-analytics').innerHTML = Object.entries(insights).map(([k,v]) => `<div style="font-size:10px">${k}: <b>${v}</b></div>`).join('');

            let html = `<table><thead><tr><th>Domain</th><th>Server</th><th>Serial</th><th>Lat</th><th>Score</th><th>AA</th><th>AXFR</th></tr></thead><tbody>`;
            filtered.forEach(d => {
                html += `<tr class="${!d.zone_is_synced ? 'anomaly-row' : ''}">
                    <td>${this.highlight(d.domain)}</td><td>${this.highlight(d.server)}</td><td>${d.serial}</td><td>${d.latency}ms</td>
                    <td style="color:${this.getClr(d.zone_score)}">${d.zone_score}</td>
                    <td>${d.aa?'OK':'--'}</td><td>${d.axfr_detail}</td>
                </tr>`;
            });
            document.getElementById('p2-content').innerHTML = html + '</tbody></table>';
        },

        renderP3() {
            const data = dataManager.current.detailed_results.records;
            const filtered = data.filter(d => JSON.stringify(d).toLowerCase().includes(this.filter));
            
            const insights = dataManager.current.analytics.phase3_records || {};
            document.getElementById('p3-analytics').innerHTML = Object.entries(insights).map(([k,v]) => `<div style="font-size:10px">${k}: <b>${v}</b></div>`).join('');

            let html = `<table><thead><tr><th>Domain</th><th>Server</th><th>Type</th><th>Status</th><th>Lat</th><th>Sync</th></tr></thead><tbody>`;
            filtered.forEach(d => {
                html += `<tr class="${d.internally_consistent==='DIV!'?'anomaly-row':''}">
                    <td>${this.highlight(d.domain)}</td><td>${this.highlight(d.server)}</td><td>${d.type}</td>
                    <td><span class="badge ${d.status==='NOERROR'?'badge-success':'badge-danger'}">${d.status}</span></td>
                    <td>${d.latency.toFixed(1)}ms</td><td>${d.internally_consistent}</td>
                </tr>`;
                if (d.findings && d.findings.length > 0) {
                    html += `<tr><td colspan="6" style="padding:5px 40px; font-size:11px; color:var(--text-secondary)">
                        ${d.findings.map(f => `↳ <span style="color:var(--warning)">!</span> ${this.highlight(f)}`).join('<br>')}
                    </td></tr>`;
                }
            });
            document.getElementById('p3-content').innerHTML = html + '</tbody></table>';
        }
    };

    const trendAnalyzer = {
        render() {
            if (dataManager.reports.length < 2) return;
            const rs = [...dataManager.reports].reverse();
            this.plot('sec-priv-chart', [{l:'Sec', k:'security_score', c:'var(--success)'}, {l:'Priv', k:'privacy_score', c:'var(--accent)'}], rs);
            this.plot('success-chart', [{l:'OK', k:'success_queries', c:'var(--info)', tf: (v,r) => (v/r.summary.total_queries)*100}], rs);
            this.plot('div-chart', [{l:'DIV', k:'divergences', c:'var(--danger)'}], rs);
        },

        plot(id, lines, rs) {
            const w = 400, h = 100, p = 20, step = (w-p*2)/(rs.length-1);
            let svg = `<svg viewBox="0 0 ${w} ${h}" class="chart-svg">`;
            lines.forEach(l => {
                const vals = rs.map(r => l.tf ? l.tf(r.summary[l.k], r) : r.summary[l.k]);
                const max = Math.max(...vals, 100);
                const pts = vals.map((v, i) => `${p + i*step},${h - p - (v/max)*(h-p*2)}`);
                svg += `<path class="line-path" d="M ${pts.join(' L ')}" style="stroke:${l.c}" />`;
                pts.forEach((pt, i) => {
                    const [x,y] = pt.split(',');
                    svg += `<circle class="data-point" cx="${x}" cy="${y}" style="stroke:${l.c}" onclick="dataManager.switchTo('${rs[i]._file}')"><title>${l.l}: ${vals[i].toFixed(1)}</title></circle>`;
                });
            });
            document.getElementById(id).innerHTML = svg + '</svg>';
        }
    };

    window.onload = () => dataManager.init();
</script>
</body>
</html>
